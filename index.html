    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #f8fafc; }
        #root { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #e0f2fe; padding: 20px; box-sizing: border-box;}
        
        .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-container h2 { color: #0c4a6e; margin-bottom: 10px; }

        .login-container input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }

        .header-center { text-align: center; margin-bottom: 20px; }

        .landing-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-radius: 12px; }
        .upload-box { border: 2px dashed #94a3b8; border-radius: 12px; padding: 40px 60px; cursor: pointer; transition: 0.2s; background: white; }
        .upload-box:hover { background-color: #e2e8f0; border-color: #0284c7; }

        .download-btn { background-color: #1d4ed8; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.9rem; }

        .report-comparison-inputs { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; }
        .report-comparison-results { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .result-card { background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #e9d5ff; text-align: center; }
        
        /* EBYS */

        .warning-table-container .col-personel { width: auto; min-width: 180px; word-break: normal; }

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        Chart.register(ChartDataLabels);

        // Sabit Değişkenler
        const PROVINCES = ["Adana","Adıyaman","Afyonkarahisar","Ağrı","Amasya","Ankara","Antalya","Artvin","Aydın","Balıkesir","Bilecik","Bingöl","Bitlis","Bolu","Burdur","Bursa","Çanakkale","Çankırı","Çorum","Denizli","Diyarbakır","Edirne","Elazığ","Erzincan","Erzurum","Eskişehir","Gaziantep","Giresun","Gümüşhane","Hakkari","Hatay","Isparta","Mersin","İstanbul","İzmir","Kars","Kastamonu","Kayseri","Kırklareli","Kırşehir","Kocaeli","Konya","Kütahya","Malatya","Manisa","Kahramanmaraş","Mardin","Muğla","Muş","Nevşehir","Niğde","Ordu","Rize","Sakarya","Samsun","Siirt","Sinop","Sivas","Tekirdağ","Tokat","Trabzon","Tunceli","Şanlıurfa","Uşak","Van","Yozgat","Zonguldak","Aksaray","Bayburt","Karaman","Kırıkkale","Batman","Şırnak","Bartın","Ardahan","Iğdır","Yalova","Karabük","Kilis","Osmaniye","Düzce"];
        const ALLOWED_COLS = ["kurum ad","ilçe","başvuru tarihi","fen kayıt tarihi","fen kayıt no","başvuru no","başvuran","işlem","zemin","görevli personel","tescil talep bilgisi","başvuru durumu","başvuru açıklama","iade", "ödeme"];
        const HEADER_KEYWORDS = {"kurum ad":["kurum","ad"],"ilçe":["ilçe", "ad"],"başvuru tarihi":["başvuru","tarih"],"fen kayıt tarihi":["fen","kayıt","tarih"],"fen kayıt no":["fen","kayıt","no"],"başvuru no":["başvuru","no"],"başvuran":["başvuran"],"işlem":["işlem"],"zemin":["zemin"],"görevli personel":["personel"],"tescil talep bilgisi":["tescil","talep","bilgi"],"başvuru durumu":["başvuru","durum"],"başvuru açıklama":["başvuru","açıklama"],"iade":["iade"], "ödeme": ["ödeme"]};

        // Yardımcı Fonksiyonlar
        const normalizeHeader = (header) => { if (!header) return ""; let s; try { s = header.normalize('NFD').replace(/[\u0300-\u036f]/g, ''); } catch (e) { s = String(header); } s = s.trim().toLocaleLowerCase('tr').replace(/\s+/g, ' '); s = s.replace(/ı/g, 'i').replace(/İ/g, 'i'); return s; }
        const splitPersonel = (text) => { if (text == null) return []; const str = typeof text === 'string' ? text : String(text); return str.split(/[,;–-]/g).map(s => { let part = s.trim(); const arrowIdx = part.indexOf('=>'); if (arrowIdx !== -1) part = part.slice(0, arrowIdx).trim(); return part.replace(/\s*\(Müh\.\)\s*/, '').trim(); }).filter(Boolean); }
        const parsePersonnelWithStatus = (text) => {
            if (text == null) return [];
            const str = typeof text === 'string' ? text : String(text);
            return str.split(/[,;]/g).map(s => {
                const parts = s.trim().split('=>');
                const name = (parts[0] || '').replace(/\s*\(Müh\.\)\s*/, '').trim();
                const status = parts.length > 1 ? parts[1].trim() : null;
                return { name, status };
            }).filter(p => p.name);
        };
        const formatDate = (val) => { if (!val) return ""; if (typeof val === 'number') { const date = XLSX.SSF.parse_date_code(val); if (!date) return ""; return `${date.y}-${String(date.m).padStart(2,'0')}-${String(date.d).padStart(2,'0')}`; } if (typeof val === 'string') { let match = val.match(/^(\d{4}-\d{2}-\d{2})/); if (match) return match[1]; match = val.match(/^(\d{1,2})[\.\/](\d{1,2})[\.\/](\d{4})/); if (match) { const day = String(match[1]).padStart(2, '0'); const month = String(match[2]).padStart(2, '0'); const year = match[3]; return `${year}-${month}-${day}`; } const part = val.split(" ")[0]; const m2 = part.match(/^(\d{1,2})[\.\/](\d{1,2})[\.\/](\d{4})/); if (m2) { const day = String(m2[1]).padStart(2, '0'); const month = String(m2[2]).padStart(2, '0'); const year = m2[3]; return `${year}-${month}-${day}`; } return part; } return val; }
        const formatToTR = (dateString) => {
            if (!dateString) return '';
            const [y, m, d] = dateString.split('-');
            return `${d}.${m}.${y}`;
        };
        const formatFenKayitNo = (val) => { if (val == null) return ""; if (typeof val === 'number') return val; if (typeof val === 'string') { const num = parseInt(val.replace(/\D/g,''),10); if (!isNaN(num)) return num; return val; } return val; }
        
        const parseTescilDate = (val) => {
            if (!val || typeof val !== 'string') return null;
            const datePart = val.split(/[\s/]/)[0];
            const match = datePart.match(/^(\d{1,2})[\.\/](\d{1,2})[\.\/](\d{4})/);
            if (match) {
                const day = String(match[1]).padStart(2, '0');
                const month = String(match[2]).padStart(2, '0');
                const year = match[3];
                const date = new Date(`${year}-${month}-${day}`);
                if (!isNaN(date.getTime())) { return date; }
            }
            return null;
        }

        const detectProvinceAndDistrict = (rawKurumAd) => {
            if (!rawKurumAd) return { province: null, district: null };
            const normRaw = normalizeHeader(rawKurumAd);
            let province = null, district = null;
        
            for (let p of PROVINCES) {
                const normP = normalizeHeader(p);
                if (normRaw.includes(normP)) {
                    province = p;
                    let after = normRaw.substring(normRaw.indexOf(normP) + normP.length).trim();
                    const hasMerkez = after.includes('merkez');
                    let cleanedAfter = after.replace(/belediyesi|belediye|bld|ilce|ilçe|merkez|buyuksehir|büyükşehir|tapu mudurlugu|kadastro mudurlugu|müdürlüğü|müd/gi, '').trim();

                    if (cleanedAfter.length > 0) {
                        district = cleanedAfter.split(' ')[0].replace(/[^a-zA-ZçğıöşüÇĞİÖŞÜ]/g, '');
                    } else if (hasMerkez) {
                        district = "Merkez";
                    }
                    break; 
                }
            }
            if (!province && normRaw.length > 0) {
                let cleanedRaw = normRaw.replace(/belediyesi|belediye|bld|ilce|ilçe|merkez|buyuksehir|büyükşehir|tapu mudurlugu|kadastro mudurlugu|müdürlüğü|müd/gi, '').trim();
                if (cleanedRaw.length > 0) district = cleanedRaw.split(' ')[0].replace(/[^a-zA-ZçğıöşüÇĞİÖŞÜ]/g, '');
            }
            if (district) district = district.charAt(0).toLocaleUpperCase('tr') + district.slice(1);
            return { province, district };
        }
        
        const normalizeName = (name) => { if (!name) return ""; return name.toString().trim().toLocaleLowerCase('tr').replace(/\s*\(müh\.\)\s*/g, '').replace(/\s+/g, '').replace(/ı/g, 'i').replace(/ö/g, 'o').replace(/ü/g, 'u').replace(/ş/g, 's').replace(/ç/g, 'c').replace(/ğ/g, 'g');}

        const readExcelPromise = (file, isComparison = false) => {
            return new Promise((resolve, reject) => {
                if (!file) { reject(new Error("Dosya yüklenmedi.")); return; }
                const validTypes = ['application/vnd.openxmlformats-officedocument.spreadsheetml.sheet','application/vnd.ms-excel'];
                if (!validTypes.includes(file.type) && !file.name.match(/\.xlsx?$|\.xls?$/i)) { reject(new Error("Lütfen .xls veya .xlsx uzantılı bir dosya seçin.")); return; }
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const ws = workbook.Sheets[workbook.SheetNames[0]];
                        let json = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true });
                        if (!json.length) { resolve({rows: [], headers: []}); return; }
                        
                        const rawHeaders = json[0].map(h => h == null ? "" : String(h));
                        
                        if (isComparison) {
                             const rowsAsObjects = XLSX.utils.sheet_to_json(ws);
                             resolve({rows: rowsAsObjects, headers: rawHeaders.filter(h => h)});
                             return;
                        }

                        const headersNorm = rawHeaders.map(h => normalizeHeader(h));
                        const colIndexes = {};
                        const allAllowedCols = [...ALLOWED_COLS, "personel", "bekleme süresi (gün)"];
                        const allHeaderKeywords = {...HEADER_KEYWORDS, "personel": ["personel"], "bekleme süresi (gün)": ["bekleme", "süre"]};

                        allAllowedCols.forEach(col => { colIndexes[col] = -1; });
                        
                        headersNorm.forEach((hNorm, idx) => {
                            for (const canonical of allAllowedCols) {
                                const keywords = allHeaderKeywords[canonical] || [canonical];
                                const allMatch = keywords.every(k => normalizeHeader(k) && hNorm.includes(normalizeHeader(k)));
                                if (allMatch && colIndexes[canonical] === -1) {
                                    colIndexes[canonical] = idx;
                                    break; 
                                }
                            }
                        });
                        
                        if (colIndexes["görevli personel"] === -1 && colIndexes["personel"] !== -1) {
                            colIndexes["görevli personel"] = colIndexes["personel"];
                        }

                        const allKurumAd = json.slice(1).map(row => { const idx = colIndexes["kurum ad"]; return idx >= 0 ? String(row[idx] || "") : ""; });
                        let provincesInFile = new Set();
                        for (let kurum of allKurumAd) { const {province} = detectProvinceAndDistrict(kurum); if (province) provincesInFile.add(province); }
                        let singleProvince = (provincesInFile.size === 1) ? Array.from(provincesInFile)[0] : null;
                        
                        const rows = json.slice(1).map(row => {
                            const obj = {};
                            allAllowedCols.forEach(col => {
                                const idx = colIndexes[col];
                                let val = idx >= 0 ? row[idx] : null;
                                if (col==='başvuru tarihi' || col==='fen kayıt tarihi') obj[col]=formatDate(val);
                                else if(col==='fen kayıt no'||col==='başvuru no') obj[col]=formatFenKayitNo(val);
                                else obj[col] = val != null ? val : "";
                            });

                            let kurumAd = String(obj['kurum ad']||'').trim();
                            const { province, district: districtFromKurumAd } = detectProvinceAndDistrict(kurumAd);

                            obj._province = province || (singleProvince || null);

                            let finalDistrict = "";
                            const districtFromIlceCol = obj['ilçe'] ? String(obj['ilçe']).trim() : null;

                            if (districtFromIlceCol) finalDistrict = districtFromIlceCol;
                            else if (districtFromKurumAd) finalDistrict = districtFromKurumAd;

                            if (finalDistrict) finalDistrict = finalDistrict.charAt(0).toLocaleUpperCase('tr') + finalDistrict.slice(1).toLocaleLowerCase('tr');
                            obj._district = finalDistrict;
                            
                            return obj;
                        });
                        resolve({rows, headers: rawHeaders.filter(h => h)});
                    } catch(err) { reject(new Error("Dosya okunurken hata oluştu.")); }
                };
                reader.onerror = () => reject(new Error("Dosya okunamadı."));
                try { reader.readAsArrayBuffer(file); } catch(err) { reject(new Error("Dosya okunurken beklenmedik hata oluştu.")); }
            });
        }

        const calcMetrics = (arr) => {
            const today = new Date();
            const threeMonthsAgo = new Date();
            threeMonthsAgo.setMonth(today.getMonth() - 3);

            let toplam = arr.length, totalDays = 0, countDays = 0;
            let yearCounts = {}, tescileGiden = 0, tescilEdilen = 0, iade = 0, iptal = 0, fenKayitAlinmayan = 0;
            let lastWeekOngoing = 0, overdueOngoing = 0, overdue30 = 0, overdue60 = 0;
            let toplamFenKayitliIslem = 0, toplamDevamEden = 0, harciYatirilmayan = 0;
            let totalTescilDays = 0, countTescilDays = 0;

            arr.forEach(d => {
                const bStr = d['başvuru tarihi'];
                const fStr = d['fen kayıt tarihi'];
                const fenKayitNo = d['fen kayıt no'];
                const aciklama = String(d['başvuru açıklama'] || '').toLocaleLowerCase('tr');
                const status = String(d['başvuru durumu'] || '').toLocaleLowerCase('tr');
                const odeme = String(d['ödeme'] || '').toLocaleLowerCase('tr');
                const tescilTalepBilgisi = d['tescil talep bilgisi'];

                const excluded = status.includes('eksiklikten iade edildi') || status.includes('tescile gönderildi');
                const hasValidFenKayitNo = fenKayitNo != null && fenKayitNo !== 0 && fenKayitNo !== '0' && fenKayitNo !== '';
                
                if (!excluded) {
                    toplamDevamEden++;
                    if (odeme.includes('ödenmedi')) harciYatirilmayan++;
                    if (hasValidFenKayitNo) toplamFenKayitliIslem++;
                }

                if (bStr) {
                    const bd = new Date(bStr);
                    if (!isNaN(bd.getTime())) {
                        if (!excluded && bd.getFullYear() > 1900) {
                            const diffDays = (today - bd) / (1000 * 60 * 60 * 24);
                            if (diffDays < 7) lastWeekOngoing++;
                            const y = bd.getFullYear();
                            yearCounts[y] = (yearCounts[y] || 0) + 1;
                        }

                        if (fStr) {
                            const fd = new Date(fStr);
                            if (!isNaN(fd.getTime()) && fd.getFullYear() > 1900 && fd >= threeMonthsAgo) {
                                const diff = (fd - bd) / (1000 * 60 * 60 * 24);
                                if (!isNaN(diff) && diff >= 0) {
                                    totalDays += diff;
                                    countDays++;
                                }
                            }
                        }
                    }
                }
                
                const fenDate = fStr ? new Date(fStr) : null;
                const tescilDate = parseTescilDate(tescilTalepBilgisi);

                if (fenDate && !isNaN(fenDate.getTime()) && fenDate.getFullYear() > 1900 && tescilDate && !isNaN(tescilDate.getTime()) && fenDate >= threeMonthsAgo) {
                    const diff = (tescilDate - fenDate) / (1000 * 60 * 60 * 24);
                    if (diff >= 0) { totalTescilDays += diff; countTescilDays++; }
                }

                if (fStr && !excluded && fStr !== '0001-01-01') {
                    const fd = new Date(fStr);
                    if (!isNaN(fd.getTime()) && fd.getFullYear() > 1900 && hasValidFenKayitNo) {
                         const diffDays = (today - fd) / (1000 * 60 * 60 * 24);
                         if (diffDays >= 7) overdueOngoing++;
                         if (diffDays >= 30) overdue30++;
                         if (diffDays >= 60) overdue60++;
                    }
                }

                if (status.includes('tescile gönderildi')) {
                    tescileGiden++;
                    if (aciklama.includes('tescil edildi')) tescilEdilen++;
                    if (aciklama.includes('iptal')) iptal++;
                }
                if (status.includes('eksiklikten iade edildi')) iade++;
                if (odeme.includes('ödendi') && !odeme.includes('ödenmedi') && !hasValidFenKayitNo) fenKayitAlinmayan++;
            });

            const avgDays = countDays > 0 ? Math.round(totalDays / countDays) : 0;
            const totalWaiting = Object.values(yearCounts).reduce((a, b) => a + b, 0);
            const avgTescilSuresi = countTescilDays > 0 ? Math.round(totalTescilDays / countTescilDays) : 0;
            return { toplam, avgDays, overdue: overdueOngoing, overdue30, overdue60, yearCounts, tescileGiden, tescilEdilen, iade, iptal, fenKayitAlinmayan, totalWaiting, avgTescilSuresi, lastWeekOngoing, toplamFenKayitliIslem, toplamDevamEden, harciYatirilmayan };
        }

            else if (personnelFilterType === 'other') dynamicTotalsData = Object.fromEntries(Object.entries(personnelStats.dynamic).filter(([name]) => !isEngineer(name)));
            const dynamicTotalCount = Object.values(dynamicTotalsData).reduce((s, v) => s + v, 0);

            return (
                 <div style={{flex: 3, display: 'flex', flexDirection: 'column', gap: '10px', minWidth: '1050px'}}>

        const ZoomedWaitingList = ({ data, title }) => {

        function WarningTable({ data, isEngineer, personnelFilterType, onFilterChange, sortField, onWarningRowsChange, warningThreshold, setWarningThreshold }) { 
            const [warningRows, setWarningRows] = useState([]); 
            const [dateSortOrder, setDateSortOrder] = useState('asc');
            const [warningPersonnelFilter, setWarningPersonnelFilter] = useState([]);
            const [showWarningPersonnelModal, setShowWarningPersonnelModal] = useState(false);

            const toggleDateSort = () => setDateSortOrder(prev => prev === 'asc' ? 'desc' : 'asc');
            useEffect(() => { setWarningPersonnelFilter([]); }, [sortField]);

            useEffect(() => {
                const today = new Date();
                let finalRows = [];

                if (sortField === 'onemli_isler') {

                    const groupedTasks = {};
                    data.forEach((d, index) => {
                        const islem = String(d['işlem'] || '').trim();

                        const fenKayitNo = d['fen kayıt no']; const key = `${fenKayitNo}-${d['ilçe']}-${index}`;
                        if (fenKayitTarihi && fenKayitTarihi >= oneHundredFiftyDaysAgo) {
                            if (fenKayitNo && !groupedTasks[key]) {
                                groupedTasks[key] = { fenKayitNo: fenKayitNo, il: d._province || '', ilce: d['ilçe'] || '', islem: d['işlem'] || '', zemin: d['zemin'] || '', basvuruDurumu: d['başvuru durumu'] || '', basvuruAciklama: d['başvuru açıklama'] || '', personnelRaw: d['görevli personel'] || '', fenKayitTarihi: d['fen kayıt tarihi'] || '', rawTask: d };

                        if (!status.includes('eksiklikten iade edildi')) return;
                        const fenKayitTarihiStr = d['fen kayıt tarihi']; if (!fenKayitTarihiStr) return; 
                        const fenKayitTarihi = new Date(fenKayitTarihiStr); if (isNaN(fenKayitTarihi.getTime())) return; 
                        const fenKayitNo = d['fen kayıt no']; const key = `${fenKayitNo}-${d['ilçe']}-${index}`;
                        if (fenKayitTarihi && fenKayitTarihi >= oneHundredDaysAgo) {
                            if (fenKayitNo && !groupedTasks[key]) {
                                groupedTasks[key] = { fenKayitNo: fenKayitNo, il: d._province || '', ilce: d['ilçe'] || '', islem: d['işlem'] || '', zemin: d['zemin'] || '', basvuruDurumu: d['başvuru durumu'] || '', basvuruAciklama: d['başvuru açıklama'] || '', personnelRaw: d['görevli personel'] || '', basvuruTarihi: d['başvuru tarihi'] || '', fenKayitTarihi: d['fen kayıt tarihi'] || '', rawTask: d };

                            const fenKayitNo = task['fen kayıt no']; const key = `iade_edilen-${index}`;
                            groupedTasks[key] = { fenKayitNo: fenKayitNo || 'Yok', il: task._province || '', ilce: task['ilçe'] || '', islem: task['işlem'] || '', zemin: task['zemin'] || '', basvuruDurumu: task['başvuru durumu'] || '', basvuruAciklama: task['başvuru açıklama'] || '', beklemeSuresi: Math.floor(diffDays), personnelRaw: task['görevli personel'] || '', basvuruTarihi: task['başvuru tarihi'] || '', fenKayitTarihi: task['fen kayıt tarihi'] || '', rawTask: task };

                        }

                    finalRows = Object.values(groupedTasks).sort((a, b) => b.beklemeSuresi - a.beklemeSuresi);

                if (sortField === 'onemli_isler' || sortField === 'uygun_olmayan_iade' || sortField === 'iade edilen') {

            }; 

            if (warningRows.length === 0) { return null; } 
            
            const isUygunOlmayanIadeMode = sortField === 'uygun_olmayan_iade'; const isOnemliIslerMode = sortField === 'onemli_isler'; const isGorevlendirmeYapilmayan = sortField === 'gorevlendirme_yapilmayan'; const isFenKayitAlinmayan = sortField === 'fen_kayit_alinmayan'; const isHarciYatirilmayan = sortField === 'harci_yatirilmayan'; const isIadeEdilen = sortField === 'iade edilen';

        function DataTable({ data, sortField, isEngineer, personnelFilterType, onFilterChange }) { 
            const [searchTerm, setSearchTerm] = useState('');
            const [isOpen, setIsOpen] = useState(false);
            let rows = [...(data||[])]; 

            if (personnelFilterType === 'engineer') rows = rows.filter(row => { const personnel = splitPersonel(row['görevli personel']); return personnel.some(p => isEngineer(p)); });
            else if (personnelFilterType === 'other') rows = rows.filter(row => { const personnel = splitPersonel(row['görevli personel']); return personnel.some(p => !isEngineer(p)); });

            if (searchTerm) rows = rows.filter(row => String(row['fen kayıt no'] || '').includes(searchTerm) );
            
            const exportToExcel = () => {
                try {
                    if (sortField === 'tescilden_geldi') {
                        const headers = ['İLÇE', 'FEN KAYIT NO', 'GÖREVLİ PERSONEL', 'BAŞVURU DURUMU'];
                        const dataForSheet = rows.map(row => [row['ilçe'], row['fen kayıt no'], row['görevli personel'], row['başvuru durumu']]);
                        const wb = XLSX.utils.book_new(); const ws = XLSX.utils.aoa_to_sheet([headers, ...dataForSheet]);
                        rows.forEach((row, rowIndex) => {
                            const cellRef = `C${rowIndex + 2}`; const personelText = row['görevli personel'] || ''; if (!personelText || !ws[cellRef]) return;
                            const richText = []; const parts = personelText.split(',').map(p => p.trim());
                            parts.forEach((part, index) => {
                                const subParts = part.split('=>');
                                if (subParts.length === 2 && subParts[1].trim().toLowerCase() === 'yapılıyor') {
                                    const name = subParts[0].trim(); richText.push({ t: name, s: { font: { color: { rgb: "FF0000" } } } }); richText.push({ t: ` => ${subParts[1].trim()}` });
                                } else { richText.push({ t: part }); }
                                if (index < parts.length - 1) richText.push({ t: ', ' });
                            });
                            ws[cellRef].t = 's'; ws[cellRef].r = richText; ws[cellRef].v = personelText;
                        });
                        ws['!cols'] = [{ wch: 20 }, { wch: 15 }, { wch: 50 }, { wch: 20 }]; XLSX.utils.book_append_sheet(wb, ws, 'Tescilden Geldi'); XLSX.writeFile(wb, 'tescilden_geldi.xlsx'); return;
                    }
                    
                    const customExportFields = ['tescile_giden', 'iade edilen', 'iptal_edilen', 'fen_kayit_alinmayan', 'plan_ornegi', 'uygun_olmayan_iade', 'onemli_isler', 'gorevlendirme_yapilmayan'];
                    if (customExportFields.includes(sortField)) {
                        const customHeaders = sortField === 'fen_kayit_alinmayan' ? ['İLÇE', 'BAŞVURU TARİHİ', 'FEN KAYIT NO', 'İŞLEM', 'ZEMİN', 'GÖREVLİ PERSONEL', 'BAŞVURU AÇIKLAMA', 'ÖDEME'] : ['İLÇE', 'FEN KAYIT TARİHİ', 'FEN KAYIT NO', 'İŞLEM', 'ZEMİN', 'GÖREVLİ PERSONEL', 'BAŞVURU AÇIKLAMA'];
                        const customCols = sortField === 'fen_kayit_alinmayan' ? ['ilçe', 'başvuru tarihi', 'fen kayıt no', 'işlem', 'zemin', 'görevli personel', 'başvuru açıklama', 'ödeme'] : ['ilçe', 'fen kayıt tarihi', 'fen kayıt no', 'işlem', 'zemin', 'görevli personel', 'başvuru açıklama'];
                        const sheetData = [customHeaders];
                        rows.forEach(row => {
                            const rowData = customCols.map(col => {
                                if (col === 'görevli personel') { let personnel = splitPersonel(row[col]); if (personnelFilterType === 'engineer') personnel = personnel.filter(p => isEngineer(p)); else if (personnelFilterType === 'other') personnel = personnel.filter(p => !isEngineer(p)); return personnel.map(p => isEngineer(p) ? `${p} (Müh.)` : p).join(', '); } return row[col];
                            }); sheetData.push(rowData);
                        });
                        const ws = XLSX.utils.aoa_to_sheet(sheetData); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Rapor'); XLSX.writeFile(wb, `${sortField}.xlsx`);
                    } else {
                        const headers = ALLOWED_COLS.map(col => col.toLocaleUpperCase('tr-TR')); const sheetData = [headers]; const redFontStyle = { font: { color: { rgb: "FFFF0000" } } };
                        rows.forEach(row => {
                            const rowData = ALLOWED_COLS.map(col => { if (col === 'görevli personel') { let personnel = splitPersonel(row[col]); if (personnelFilterType === 'engineer') personnel = personnel.filter(p => isEngineer(p)); else if (personnelFilterType === 'other') personnel = personnel.filter(p => !isEngineer(p)); return personnel.map(p => isEngineer(p) ? `${p} (Müh.)` : p).join(', '); } return row[col]; }); sheetData.push(rowData);
                        });
                        const ws = XLSX.utils.aoa_to_sheet(sheetData);
                        rows.forEach((row, rowIndex) => {
                            ALLOWED_COLS.forEach((col, colIndex) => {
                                const cell_ref = XLSX.utils.encode_cell({c: colIndex, r: rowIndex + 1}); if (!ws[cell_ref]) return;
                                let shouldBeRed = false;
                                if (col === 'başvuru açıklama') { const cellValue = String(row[col] || '').toLocaleLowerCase('tr'); if (cellValue.includes('iptal') || cellValue.includes('tescil edildi')) shouldBeRed = true; } 
                                else if (col === 'görevli personel') { const personnel = splitPersonel(row[col]); if (personnel.some(p => isEngineer(p))) shouldBeRed = true; }
                                if (shouldBeRed) ws[cell_ref].s = redFontStyle;
                            });
                        });
                        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Tum_Islemler'); XLSX.writeFile(wb, 'tum_islemler.xlsx'); 
                    }
                } catch(err) { alert("Excel'e aktarma sırasında bir hata oluştu."); } 
            };
            
            if(!rows) return null; 

            const tableBody = rows.length > 0 ? (
                rows.map((row,i) => (
                    <tr key={i}>
                        {ALLOWED_COLS.map(col => {
                            if (col === 'görevli personel') {
                                let personnel = splitPersonel(row[col]);
                                if (personnelFilterType === 'engineer') personnel = personnel.filter(p => isEngineer(p));
                                else if (personnelFilterType === 'other') personnel = personnel.filter(p => !isEngineer(p));
                                return (
                                    <td key={col} className={`col-${col.replace(/\s+/g, '-')}`}>
                                        {personnel.map((p, i) => (
                                            <React.Fragment key={i}><span style={{ color: isEngineer(p) ? 'red' : 'inherit' }}>{p} {isEngineer(p) ? '(Müh.)' : ''}</span>{i < personnel.length - 1 && ', '}</React.Fragment>
                                        ))}
                                    </td>
                                );
                            }
                             if (col === 'başvuru açıklama') {
                                 const text = row[col]; if (typeof text !== 'string' || !text) return <td key={col} className={`col-${col.replace(/\s+/g, '-')}`}>{text}</td>;
                                 const keywords = ['iptal', 'tescil edildi']; const regex = new RegExp(`(${keywords.join('|')})`, 'gi'); const parts = text.split(regex);
                                 return (<td key={col} className={`col-${col.replace(/\s+/g, '-')}`}>{parts.map((part, index) => keywords.some(kw => part.toLowerCase() === kw.toLowerCase()) ? <span key={index} style={{color: 'red'}}>{part}</span> : part)}</td>);
                             }
                            return <td key={col} className={`col-${col.replace(/\s+/g, '-')}`}>{row[col]}</td>
                        })}
                    </tr>
                ))
            ) : (<tr><td colSpan={ALLOWED_COLS.length} style={{textAlign:'center',color:'#6b7280'}}>Kayıt bulunamadı.</td></tr>);

            return (
                <div className="datatable-container"> 
                    <div className="datatable-header" style={{cursor: 'pointer', background: '#f8fafc', padding: '15px', borderRadius: '8px', border: '1px solid #e2e8f0'}} onClick={() => setIsOpen(!isOpen)}> 
                        <h3 style={{margin: 0, color: '#0f172a'}}>Tüm İşlemler {isOpen ? '▼' : '▶'}</h3> 
                        <span style={{fontSize: '0.85rem', color: '#64748b'}}>Tıklayarak {isOpen ? 'gizle' : 'göster'}</span>
                    </div> 
                    {isOpen && (
                        <div style={{marginTop: '15px'}}>
                            <div style={{display: 'flex', gap: '10px', alignItems: 'center', marginBottom: '15px'}}>
                                 <div style={{display: 'flex', alignItems: 'center', marginRight: '10px'}}>
                                     <label style={{fontSize: '0.9rem', fontWeight: 'bold', color: '#334155', marginRight: '5px'}}>Filtre:</label>
                                     <select value={personnelFilterType} onChange={(e) => onFilterChange(e.target.value)} style={{padding: '6px', borderRadius: '4px', border: '1px solid #cbd5e1', fontSize: '0.9rem'}}>
                                         <option value="all">Tümü</option><option value="engineer">Sadece Mühendisler</option><option value="other">Diğer Personel</option>
                                     </select>
                                 </div>
                                <input type="text" placeholder="Fen Kayıt No ile Ara..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} style={{padding: '6px 10px', borderRadius: '4px', border: '1px solid #d1d5db'}}/>
                                <button className="export-btn" onClick={exportToExcel} title="Bu tabloyu Excel olarak indir">Excel İndir</button> 
                            </div>
                            <div className="table-wrapper" style={{marginTop: 0}}> 
                                <table><thead><tr>{ALLOWED_COLS.map(col => <th key={col}>{col.toLocaleUpperCase('tr-TR')}</th>)}</tr></thead><tbody>{tableBody}</tbody></table> 
                            </div>
                        </div>
                    )}
                </div>
            ); 
        }

        function ReportComparison({ engineers, isEngineer }) {
            const [oldReport, setOldReport] = useState({ data: [], headers: [], name: '' });
            const [newReport, setNewReport] = useState({ data: [], headers: [], name: '' });
            const [comparisonResult, setComparisonResult] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [analyzeEngineersOnly, setAnalyzeEngineersOnly] = useState(false);

            const handleFileChange = async (e, reportType) => {
                const inputElement = e.target; const file = inputElement.files[0]; if (!file) return;
                setIsLoading(true);
                try {
                    const { rows, headers } = await readExcelPromise(file, true);
                    const reportData = { data: rows, headers, name: file.name };
                    if (reportType === 'old') setOldReport(reportData); else setNewReport(reportData);
                } catch (err) { alert(`Hata: ${err.message}`); } finally { setIsLoading(false); if (inputElement) inputElement.value = null; }
            };
            
            const findHeader = (headers, keywords) => {
                const normalizedKeywords = keywords.map(k => normalizeHeader(k));
                for (const header of headers) { if (normalizedKeywords.every(kw => normalizeHeader(header).includes(kw))) return header; }
                return null;
            }

            const handleCompare = () => {
                if (oldReport.data.length === 0 || newReport.data.length === 0) { alert("Lütfen her iki raporu da yükleyin."); return; }
                const fenKayitNoHeaderOld = findHeader(oldReport.headers, ['fen', 'kayıt', 'no']); const zeminHeaderOld = findHeader(oldReport.headers, ['zemin']); const personelHeaderOld = findHeader(oldReport.headers, ['personel']);
                const oldReportMap = new Map();
                oldReport.data.forEach(row => { const key = (row[fenKayitNoHeaderOld] != null && row[fenKayitNoHeaderOld] != 0) ? String(row[fenKayitNoHeaderOld]) : String(row[zeminHeaderOld] || ''); if (key) oldReportMap.set(key, row); });

                const fenKayitNoHeaderNew = findHeader(newReport.headers, ['fen', 'kayıt', 'no']); const zeminHeaderNew = findHeader(newReport.headers, ['zemin']);
                const newReportMap = new Map();
                newReport.data.forEach(row => { const key = (row[fenKayitNoHeaderNew] != null && row[fenKayitNoHeaderNew] != 0) ? String(row[fenKayitNoHeaderNew]) : String(row[zeminHeaderNew] || ''); if (key) newReportMap.set(key, row); });

                const completed = []; const ongoing = []; const added = [];
                oldReportMap.forEach((row, key) => { if (!newReportMap.has(key)) completed.push(row); else ongoing.push(newReportMap.get(key)); });
                newReportMap.forEach((row, key) => { if (!oldReportMap.has(key)) added.push(row); });
                
                if (analyzeEngineersOnly) {
                    const engineerAnalysis = {}; const allEngineers = new Set(engineers.map(normalizeName));
                    const processReportForEngineers = (reportData, reportHeaders, targetObject, status) => {
                         const personelHeader = findHeader(reportHeaders, ['personel']); if (!personelHeader) return;
                        reportData.forEach(row => {
                            const personnel = splitPersonel(row[personelHeader]);
                            personnel.forEach(pName => {
                                const normPName = normalizeName(pName);
                                if (allEngineers.has(normPName)) { if (!targetObject[pName]) { targetObject[pName] = { completed: [], ongoing: [], added: [] }; } targetObject[pName][status].push(row); }
                            });
                        });
                    };
                    processReportForEngineers(completed, oldReport.headers, engineerAnalysis, 'completed');
                    processReportForEngineers(ongoing, newReport.headers, engineerAnalysis, 'ongoing');
                    processReportForEngineers(added, newReport.headers, engineerAnalysis, 'added');
                    setComparisonResult({ engineerAnalysis });
                } else {
                     setComparisonResult({ completed: { data: completed, headers: oldReport.headers }, ongoing: { data: ongoing, headers: newReport.headers }, added: { data: added, headers: newReport.headers } });
                }
            };
            
            const exportComparisonToExcel = (data, headers, fileName) => {
                if (data.length === 0) return;
                const ws = XLSX.utils.json_to_sheet(data, { header: headers }); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Rapor"); XLSX.writeFile(wb, `${fileName}.xlsx`);
            };

            const exportEngineerAnalysisToExcel = () => {
                if (!comparisonResult || !comparisonResult.engineerAnalysis) return;
                const wb = XLSX.utils.book_new(); const summaryData = [["Mühendis", "Tamamlanan", "Devam Eden", "Yeni Eklenen"]];

                Object.keys(comparisonResult.engineerAnalysis).sort((a,b) => a.localeCompare(b, 'tr')).forEach(engineerName => {
                        const analysis = comparisonResult.engineerAnalysis[engineerName];
                        summaryData.push([engineerName, analysis.completed.length, analysis.ongoing.length, analysis.added.length]);
                });
                
                const wsSummary = XLSX.utils.aoa_to_sheet(summaryData); wsSummary['!cols'] = [ { wch: 30 }, { wch: 15 }, { wch: 15 }, { wch: 15 } ]; XLSX.utils.book_append_sheet(wb, wsSummary, "Özet");
                
                Object.keys(comparisonResult.engineerAnalysis).forEach(engineerName => {
                    const analysis = comparisonResult.engineerAnalysis[engineerName]; const sheetData = []; const headers = new Set([...oldReport.headers, ...newReport.headers]);

                    if(analysis.completed.length > 0) { sheetData.push(["--- TAMAMLANAN İŞLER ---"]); sheetData.push(Array.from(headers)); analysis.completed.forEach(row => { sheetData.push(Array.from(headers).map(h => row[h] || "")); }); sheetData.push([]); }
                    if(analysis.ongoing.length > 0) { sheetData.push(["--- DEVAM EDEN İŞLER ---"]); sheetData.push(Array.from(headers)); analysis.ongoing.forEach(row => { sheetData.push(Array.from(headers).map(h => row[h] || "")); }); sheetData.push([]); }
                    if(analysis.added.length > 0) { sheetData.push(["--- YENİ EKLENEN İŞLER ---"]); sheetData.push(Array.from(headers)); analysis.added.forEach(row => { sheetData.push(Array.from(headers).map(h => row[h] || "")); }); }
                    
                    if (sheetData.length > 0) { const ws = XLSX.utils.aoa_to_sheet(sheetData); XLSX.utils.book_append_sheet(wb, ws, engineerName.substring(0, 31)); }
                });
                XLSX.writeFile(wb, "Muhendis_Performans_Analizi.xlsx");
            }

            return (
                 <div className="report-comparison-container">
                    <div className="report-comparison-header"><h3>Rapor Karşılaştırma</h3></div>
                    <div className="report-comparison-inputs">
                        <div className="control-group"><label>Eski Rapor</label><input type="file" onChange={(e) => handleFileChange(e, 'old')} accept=".xlsx, .xls" /><span>Seçilen: {oldReport.name}</span></div>
                        <div className="control-group"><label>Yeni Rapor</label><input type="file" onChange={(e) => handleFileChange(e, 'new')} accept=".xlsx, .xls" /><span>Seçilen: {newReport.name}</span></div>
                    </div>
                     <div style={{textAlign: 'center', margin: '15px 0'}}><label style={{display: 'inline-flex', alignItems: 'center', cursor: 'pointer'}}><input type="checkbox" checked={analyzeEngineersOnly} onChange={() => { setAnalyzeEngineersOnly(!analyzeEngineersOnly); setComparisonResult(null); }} /> Sadece Mühendisleri Analiz Et</label></div>
                    <div className="report-comparison-actions"><button onClick={handleCompare} disabled={isLoading || oldReport.data.length === 0 || newReport.data.length === 0}>{isLoading ? 'Yükleniyor...' : 'Karşılaştır'}</button></div>
                    {comparisonResult && (
                        analyzeEngineersOnly ? (
                            <div style={{textAlign: 'center', marginTop: '20px'}}>
                                <button className="excel-btn" style={{backgroundColor: '#7e22ce', padding: '10px 20px'}} onClick={exportEngineerAnalysisToExcel}>Mühendis Performans Raporunu İndir</button>
                                <p style={{fontSize: '0.9rem', color: '#581c87', marginTop: '10px'}}>Excel dosyasında her mühendis için ayrı bir sayfa oluşturulacaktır.</p>
                            </div>
                        ) : (
                            <div className="report-comparison-results">
                                <div className="result-card"><h4>Tamamlanan İşler</h4><p>{comparisonResult.completed.data.length} adet</p><button className="excel-btn" disabled={comparisonResult.completed.data.length === 0} onClick={() => exportComparisonToExcel(comparisonResult.completed.data, comparisonResult.completed.headers, 'Tamamlanan_Isler')}>Excel İndir</button></div>
                                <div className="result-card"><h4>Yeni Eklenen İşler</h4><p>{comparisonResult.added.data.length} adet</p><button className="excel-btn" disabled={comparisonResult.added.data.length === 0} onClick={() => exportComparisonToExcel(comparisonResult.added.data, comparisonResult.added.headers, 'Yeni_Eklenen_Isler')}>Excel İndir</button></div>
                                <div className="result-card"><h4>Halen Devam Eden İşler</h4><p>{comparisonResult.ongoing.data.length} adet</p><button className="excel-btn" disabled={comparisonResult.ongoing.data.length === 0} onClick={() => exportComparisonToExcel(comparisonResult.ongoing.data, comparisonResult.ongoing.headers, 'Devam_Eden_Isler')}>Excel İndir</button></div>
                            </div>
                        )
                    )}
                 </div>
            );
        }

        function MegsisReporter({ data, isEngineer }) {
            const [isLoading, setIsLoading] = useState(false);
            const [personnelOptions, setPersonnelOptions] = useState([]);
            const [selectedPersonnel, setSelectedPersonnel] = useState([]);
            const [showPersonnelModal, setShowPersonnelModal] = useState(false);

            useEffect(() => {
                if (data && data.length > 0) {
                    const allPersonnel = [...new Set(data.flatMap(row => parsePersonnelWithStatus(row['görevli personel'] || row.personnelRaw).map(p => p.name)))].sort((a, b) => a.localeCompare(b, 'tr'));
                    setPersonnelOptions(allPersonnel);
                } else { setPersonnelOptions([]); setSelectedPersonnel([]); }
            }, [data]);
        
            const generateReport = async (type) => {
                if (data.length === 0) { alert("Rapor oluşturmak için lütfen önce bir MEGSİS dosyası yükleyin."); return; }
                setIsLoading(true);
        
                try {
                    const uniqueProvinces = [...new Set(data.map(d => d._province || d.il).filter(Boolean))];
                    const showProvinceCol = uniqueProvinces.length > 1;

                    let reportItems = [];

                    if (type === 'district') {
                        const groups = {
                            "Anamur-Bozyazı": ["anamur", "bozyazı"], "Silifke-Aydıncık-Gülnar": ["silifke", "aydıncık", "gülnar"],
                            "Tarsus-Çamlıyayla": ["tarsus", "çamlıyayla"], "Merkez İlçeler": ["akdeniz", "mezitli", "yenişehir", "toroslar"]
                        };
                        
                        const availableDistricts = [...new Set(data.map(row => row._district || row.ilce).filter(Boolean))];
                        const groupedDistricts = new Set();

                        Object.entries(groups).forEach(([groupName, groupDistricts]) => {
                            const hasData = groupDistricts.some(d => availableDistricts.some(ad => ad.toLocaleLowerCase('tr') === d));
                            if (hasData) { reportItems.push({ name: groupName, filterFn: (row) => { const d = (row._district || row.ilce || '').toLocaleLowerCase('tr'); return groupDistricts.includes(d); } }); groupDistricts.forEach(d => groupedDistricts.add(d)); }
                        });

                        availableDistricts.forEach(dist => { if (!groupedDistricts.has(dist.toLocaleLowerCase('tr'))) { reportItems.push({ name: dist, filterFn: (row) => (row._district || row.ilce) === dist }); } });
                        reportItems.sort((a, b) => a.name.localeCompare(b.name, 'tr'));

                    } else if (type === 'selected_personnel') {
                        if (selectedPersonnel.length === 0) { alert("Lütfen en az bir personel seçin."); setIsLoading(false); return; }
                        reportItems = selectedPersonnel.map(pName => ({ name: pName, filterFn: (row) => parsePersonnelWithStatus(row['görevli personel'] || row.personnelRaw).some(p => p.name === pName) }));
                    } else {
                        const allPersonnelInData = [...new Set(data.flatMap(row => parsePersonnelWithStatus(row['görevli personel'] || row.personnelRaw).filter(p => type === 'engineer' ? isEngineer(p.name) : !isEngineer(p.name)).map(p => p.name)))].sort((a, b) => a.localeCompare(b, 'tr'));
                        if (allPersonnelInData.length === 0) { let entityName = type === 'engineer' ? 'mühendis' : 'personel'; alert(`Yüklenen dosyada raporlanacak ${entityName} bulunamadı.`); setIsLoading(false); return; }
                        reportItems = allPersonnelInData.map(pName => ({ name: pName, filterFn: (row) => parsePersonnelWithStatus(row['görevli personel'] || row.personnelRaw).some(p => p.name === pName && (type === 'engineer' ? isEngineer(p.name) : !isEngineer(p.name))) }));
                    }
        
                    const mainWb = XLSX.utils.book_new();

                    for (let i = 0; i < reportItems.length; i++) {
                        const item = reportItems[i]; let filteredRows = data.filter(item.filterFn);
                        filteredRows.sort((a, b) => { const dateA = a['fen kayıt tarihi'] || a.fenKayitTarihi ? new Date(a['fen kayıt tarihi'] || a.fenKayitTarihi) : null; const dateB = b['fen kayıt tarihi'] || b.fenKayitTarihi ? new Date(b['fen kayıt tarihi'] || b.fenKayitTarihi) : null; if (dateA && dateB) return dateA - dateB; if (dateA) return -1; if (dateB) return 1; return 0; });
        
                        if (filteredRows.length > 0) {
                            const today = new Date();
                            const dataToExport = filteredRows.map(row => {
                                const status = String(row['başvuru durumu'] || row.basvuruDurumu || '').toLocaleLowerCase('tr'); const isClosed = status.includes('eksiklikten iade edildi') || status.includes('tescile gönderildi');
                                const fStr = row['fen kayıt tarihi'] || row.fenKayitTarihi; let beklemeSuresi = '';
                                if (fStr && !isClosed) { const fenKayitDate = new Date(fStr); if (!isNaN(fenKayitDate) && fenKayitDate.getFullYear() > 1900) { const diffDays = (today - fenKayitDate) / (1000 * 60 * 60 * 24); if (diffDays >= 0) beklemeSuresi = Math.floor(diffDays); } }
                                const obj = { 'Personel': parsePersonnelWithStatus(row['görevli personel'] || row.personnelRaw).map(p => isEngineer(p.name) ? `${p.name} (Müh.)` : p.name).join("\n"), 'Fen Kayıt Tarihi': row['fen kayıt tarihi'] || row.fenKayitTarihi, 'Fen Kayıt No': row['fen kayıt no'] || row.fenKayitNo };
                                if (showProvinceCol) obj['İl'] = row._province || row.il;
                                obj['İlçe'] = row._district || row.ilce; obj['İşlem'] = row['işlem'] || row.islem; obj['Zemin'] = row['zemin'] || row.zemin; obj['Başvuru Durumu'] = row['başvuru durumu'] || row.basvuruDurumu; obj['Bekleme Süresi (Gün)'] = beklemeSuresi;
                                return obj;
                            });
        
                            const ws = XLSX.utils.json_to_sheet(dataToExport);
                            const colWidths = [30, 15, 15]; if (showProvinceCol) colWidths.push(15); colWidths.push(15, 20, 40, 25, 20); 
                            ws['!cols'] = colWidths.map(w => ({ wch: w }));
        
                            const range = XLSX.utils.decode_range(ws['!ref']);
                            for (let R = range.s.r + 1; R <= range.e.r; ++R) {
                                const cell_address = { c: 0, r: R }; const cell_ref = XLSX.utils.encode_cell(cell_address);
                                if (ws[cell_ref] && ws[cell_ref].v) { if (!ws[cell_ref].s) ws[cell_ref].s = {}; ws[cell_ref].s.alignment = { wrapText: true, vertical: 'top' }; }
                            }
                            
                            if (type === 'selected_personnel') {
                                const individualWb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(individualWb, ws, "Rapor"); const safeName = item.name.replace(/[\\/*?:"<>|]/g, ''); XLSX.writeFile(individualWb, `${safeName} (MEGSİS).xlsx`); await new Promise(resolve => setTimeout(resolve, 200));
                            } else {
                                const sheetName = item.name.replace(/[\\/*?:]/g, "").substring(0, 31); XLSX.utils.book_append_sheet(mainWb, ws, sheetName);
                            }
                        }
                    }
                    
                    if (type !== 'selected_personnel') {
                        let fileName = 'MEGSIS_Raporu.xlsx';
                        if (type === 'engineer') fileName = 'MEGSIS_Muhendis_Raporu.xlsx'; else if (type === 'other') fileName = 'MEGSIS_Diger_Personel_Raporu.xlsx'; else if (type === 'district') fileName = 'MEGSIS_Ilce_Raporu.xlsx';
                        XLSX.writeFile(mainWb, fileName);
                    }
                } catch (err) { alert("Rapor oluşturulurken bir hata oluştu."); } finally { setIsLoading(false); }
            };
        
            return (
                <div className="ebys-reporter-container" style={{backgroundColor: '#f0f9ff', borderColor: '#bae6fd'}}>
                    <div className="ebys-reporter-header"><h3 style={{color: '#075985'}}>MEGSİS Raporlama</h3></div>
                    <div className="ebys-controls">
                        <p style={{textAlign: 'center', fontSize: '0.9rem', color: '#0369a1', width: '100%', marginBottom: '15px'}}>Yukarıdaki <b>Uyarı Tablosunda</b> listelenen verileri baz alarak rapor oluşturur. Süre ve Filtreleri yukarıdan ayarlayabilirsiniz.</p>
                        <button onClick={() => generateReport('engineer')} disabled={isLoading || data.length === 0}>{isLoading ? 'İşleniyor...' : 'Mühendis Bazlı Rapor Al'}</button>
                        <button onClick={() => generateReport('other')} disabled={isLoading || data.length === 0} style={{backgroundColor: '#0ea5e9'}}>{isLoading ? 'İşleniyor...' : 'Diğer Personel Bazlı Rapor Al'}</button>
                         <button onClick={() => generateReport('district')} disabled={isLoading || data.length === 0} style={{backgroundColor: '#8b5cf6'}}>{isLoading ? 'İşleniyor...' : 'İlçe Bazlı Rapor Al'}</button>
                        {personnelOptions.length > 0 && (
                            <div style={{ display: 'flex', gap: '10px', alignItems: 'center', marginTop: '10px', width: '100%', justifyContent: 'center', borderTop: '1px dashed #bae6fd', paddingTop: '15px' }}>
                                <button onClick={() => setShowPersonnelModal(true)} style={{backgroundColor: '#f59e0b', color: 'white'}}>{selectedPersonnel.length ? `${selectedPersonnel.length} Personel Seçili` : 'Özel Personel Seç'}</button>
                                <button onClick={() => generateReport('selected_personnel')} disabled={isLoading || data.length === 0 || selectedPersonnel.length === 0} style={{backgroundColor: '#10b981'}}>{isLoading ? 'İşleniyor...' : 'Seçili Personel Raporunu Al'}</button>
                            </div>
                        )}
                    </div>
                    {showPersonnelModal && (
                        <div className="modal-overlay" onClick={() => setShowPersonnelModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <div className="modal-header"><h3>MEGSİS Personel Seç</h3><button className="close-btn" onClick={()=>setShowPersonnelModal(false)}>×</button></div>
                                <div className="modal-content"><div className="filter-list"><div className="filter-item" key="select-all-megsis"><label><input type="checkbox" checked={selectedPersonnel.length === personnelOptions.length && personnelOptions.length > 0} onChange={e => { if (e.target.checked) setSelectedPersonnel(personnelOptions); else setSelectedPersonnel([]); }} /><b>Tümünü Seç/Bırak</b></label></div>{personnelOptions.map(p => (<div className="filter-item" key={p}><label style={{color: isEngineer(p) ? 'red' : 'inherit'}}><input type="checkbox" checked={selectedPersonnel.includes(p)} onChange={e=>{ if(e.target.checked) setSelectedPersonnel([...selectedPersonnel, p]); else setSelectedPersonnel(selectedPersonnel.filter(item => item !== p)); }}/> {p} {isEngineer(p) ? '(Müh.)' : ''}</label></div>))}</div></div>
                                <div className="modal-footer"><button className="download-btn" onClick={()=>{setSelectedPersonnel([]); setShowPersonnelModal(false);}}>Temizle & Kapat</button><button className="download-btn" style={{backgroundColor: '#16a34a'}} onClick={()=> setShowPersonnelModal(false)}>Uygula</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function EbysReporter({ onZoom }) {
            const [ebysData, setEbysData] = useState([]);
            const [personnelOptions, setPersonnelOptions] = useState([]);
            const [selectedPersonnel, setSelectedPersonnel] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [reportReady, setReportReady] = useState(null);
            const [fileNames, setFileNames] = useState([]);
            const [totalEbysDocs, setTotalEbysDocs] = useState(0);
            const ebysChartRef = useRef(null);
            const ebysChartInstance = useRef(null);
            const [stackedChartData, setStackedChartData] = useState(null);
            
            const parseEbysDate = (val) => {
                if (typeof val === 'number') { const date = XLSX.SSF.parse_date_code(val); if (!date) return null; const dateObj = new Date(date.y, date.m - 1, date.d); if (isNaN(dateObj.getTime())) return null; return dateObj; }
                if (typeof val === 'string') { let match = val.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/); if (match) { const day = String(match[1]).padStart(2, '0'); const month = String(match[2]).padStart(2, '0'); const year = match[3]; const dateObj = new Date(`${year}-${month}-${day}`); if (!isNaN(dateObj.getTime())) return dateObj; } }
                return null;
            };

            const handleFileChange = async (e) => {
                const inputElement = e.target; const files = Array.from(inputElement.files); if (files.length === 0) return;
                setIsLoading(true);
                try {
                    const fileReadPromises = files.map(file => readExcelPromise(file, true).then(result => ({...result, fileName: file.name })));
                    const allReports = await Promise.all(fileReadPromises);

                    let currentPersonnel = new Set(personnelOptions); let newRows = []; let newFileNames = [...fileNames];

                    allReports.forEach(report => {
                        if (report.rows.length === 0) return;
                        const personnelHeader = Object.keys(report.rows[0]).find(h => normalizeHeader(h).includes('bekleyen') && (normalizeHeader(h).includes('kullanıcı') || normalizeHeader(h).includes('kullanici')));
                        if (!personnelHeader) throw new Error(`"${report.fileName}" dosyasında 'İşlemde Bekleyen Kullanıcı' sütunu bulunamadı.`);
                        if (!newFileNames.includes(report.fileName)) newFileNames.push(report.fileName);

                        report.rows.forEach(row => { const personnelName = row[personnelHeader]; if (personnelName) currentPersonnel.add(personnelName); });
                        newRows.push(...report.rows);
                    });
                    
                    const uniquePersonnel = [...currentPersonnel].sort((a,b) => a.localeCompare(b,'tr'));
                    setPersonnelOptions(uniquePersonnel);
                    const combinedData = [...ebysData, ...newRows];
                    setEbysData(combinedData); setTotalEbysDocs(combinedData.length); setFileNames(newFileNames);
                } catch (err) { alert(`Hata: ${err.message}`); } finally { setIsLoading(false); if (inputElement) inputElement.value = null; }
            };
            
            const clearEbysData = () => { setEbysData([]); setPersonnelOptions([]); setSelectedPersonnel([]); setFileNames([]); setTotalEbysDocs(0); };

            const generateReport = (type) => {
                if (type === 'personnel' && selectedPersonnel.length === 0) { alert("Lütfen en az bir personel seçin."); return; }
                if (type === 'year' && ebysData.length === 0) { alert("Raporlanacak veri bulunamadı."); return; }
                setReportReady(type);
            };
            
             useEffect(() => {
                 if (reportReady && ebysData.length > 0) {
                     const personnelHeader = Object.keys(ebysData[0]).find(h => normalizeHeader(h).includes('bekleyen') && (normalizeHeader(h).includes('kullanıcı') || normalizeHeader(h).includes('kullanici')));
                     const dateHeader = Object.keys(ebysData[0]).find(h => normalizeHeader(h) === 'tarih');
                     const wb = XLSX.utils.book_new();

                     if (reportReady === 'personnel') {
                         const summaryData = [];
                         const years = [...new Set(ebysData.map(row => { const date = parseEbysDate(row[dateHeader]); return date ? date.getFullYear() : null; }).filter(Boolean))].sort();

                         const headers = ["Personel", "Toplam Bekleyen", ...years];
                         summaryData.push(headers);
                         
                         selectedPersonnel.forEach(personel => {
                             const filteredData = ebysData.filter(row => row[personnelHeader] === personel);
                             const yearCounts = {}; years.forEach(y => yearCounts[y] = 0);
                             filteredData.forEach(row => { const date = parseEbysDate(row[dateHeader]); if (date) { const year = date.getFullYear(); if (yearCounts[year] !== undefined) yearCounts[year]++; } });
                             const rowData = [ personel, filteredData.length, ...years.map(y => yearCounts[y]) ];
                             summaryData.push(rowData);
                         });
                         
                         const wsSummary = XLSX.utils.aoa_to_sheet(summaryData); wsSummary['!cols'] = [{ wch: 30 }, { wch: 15 }, ...years.map(() => ({ wch: 10 }))]; XLSX.utils.book_append_sheet(wb, wsSummary, "Özet");

                         selectedPersonnel.forEach(personel => {
                             let filteredData = ebysData.filter(row => row[personnelHeader] === personel);
                             filteredData.sort((a, b) => { const dateA = parseEbysDate(a[dateHeader]); const dateB = parseEbysDate(b[dateHeader]); if (dateA && dateB) return dateA - dateB; if (dateA) return -1; if (dateB) return 1; return 0; });
                             const ws = XLSX.utils.json_to_sheet(filteredData); const sheetName = personel.replace(/[\\/*?:]/g, "").substring(0, 31); XLSX.utils.book_append_sheet(wb, ws, sheetName);
                         });
                         XLSX.writeFile(wb, "EBYS_Personel_Raporu.xlsx");
                     } else if (reportReady === 'year') {
                         const years = [...new Set(ebysData.map(row => { const date = parseEbysDate(row[dateHeader]); return date ? date.getFullYear().toString() : "Tarihsiz"; }))].sort();
                         const summaryData = [["Yıl", "Toplam Bekleyen Evrak"]];
                         years.forEach(year => { const count = ebysData.filter(row => { const d = parseEbysDate(row[dateHeader]); const y = d ? d.getFullYear().toString() : "Tarihsiz"; return y === year; }).length; summaryData.push([year, count]); });
                         const wsSummary = XLSX.utils.aoa_to_sheet(summaryData); wsSummary['!cols'] = [{ wch: 15 }, { wch: 25 }]; XLSX.utils.book_append_sheet(wb, wsSummary, "Yıllık Özet");

                         years.forEach(year => {
                             let filteredData = ebysData.filter(row => { const d = parseEbysDate(row[dateHeader]); const y = d ? d.getFullYear().toString() : "Tarihsiz"; return y === year; });
                             filteredData.sort((a, b) => { const dateA = parseEbysDate(a[dateHeader]); const dateB = parseEbysDate(b[dateHeader]); if (dateA && dateB) return dateA - dateB; if (dateA) return -1; if (dateB) return 1; return 0; });
                             const ws = XLSX.utils.json_to_sheet(filteredData); const sheetName = year.substring(0, 31); XLSX.utils.book_append_sheet(wb, ws, sheetName);
                         });
                         XLSX.writeFile(wb, "EBYS_Yila_Gore_Rapor.xlsx");
                     }
                     setReportReady(null);
                 }
             }, [reportReady, ebysData, selectedPersonnel]);

             useEffect(() => {
                 if (ebysData.length > 0) {
                    const personnelHeader = Object.keys(ebysData[0]).find(h => normalizeHeader(h).includes('bekleyen') && (normalizeHeader(h).includes('kullanıcı') || normalizeHeader(h).includes('kullanici')));
                    const dateHeader = Object.keys(ebysData[0]).find(h => normalizeHeader(h) === 'tarih');
                    const pData = {};
                    ebysData.forEach(row => {
                        const p = row[personnelHeader];
                        if (p) {
                            if (!pData[p]) pData[p] = {};
                            const date = parseEbysDate(row[dateHeader]);
                            const year = date ? date.getFullYear().toString() : "Tarihsiz";
                            pData[p][year] = (pData[p][year] || 0) + 1;
                        }
                    });
                    setStackedChartData(pData);
                 } else { setStackedChartData(null); }
             }, [ebysData]);

             useEffect(() => {
                 if(stackedChartData && ebysChartRef.current){
                     if(ebysChartInstance.current) ebysChartInstance.current.destroy();

                     const sortedPersonnel = Object.keys(stackedChartData).sort((a, b) => { const totalA = Object.values(stackedChartData[a]).reduce((s, c) => s + c, 0); const totalB = Object.values(stackedChartData[b]).reduce((s, c) => s + c, 0); return totalB - totalA; });
                     const allYears = [...new Set(Object.values(stackedChartData).flatMap(yearsObj => Object.keys(yearsObj)))].sort();
                     const datasets = allYears.map((year, index) => ({ label: year, data: sortedPersonnel.map(p => stackedChartData[p][year] || 0), backgroundColor: `hsl(${index * 50 + 200}, 70%, 60%)`, stack: 'Stack 0', }));

                     ebysChartInstance.current = new Chart(ebysChartRef.current, {
                         type: 'bar', data: { labels: sortedPersonnel, datasets: datasets },
                         options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: true, position: 'bottom' }, title: { display: true, text: 'EBYS Personel Bekleyen Evrak (Yıllara Göre)' }, datalabels: { color: '#fff', font: { weight: 'bold', size: 10 }, formatter: (value) => value > 0 ? value : null, display: (context) => context.dataset.data[context.dataIndex] > 0 } }, scales: { x: { stacked: true, beginAtZero: true }, y: { stacked: true } }, }
                     });
                 } else { if(ebysChartInstance.current) { ebysChartInstance.current.destroy(); ebysChartInstance.current = null; } }
             }, [stackedChartData]);

            const displayRows = React.useMemo(() => {
                if (!ebysData || ebysData.length === 0) return [];
                const keys = Object.keys(ebysData[0]);
                const keySayi = keys.find(k => normalizeHeader(k) === 'sayı') || keys.find(k => normalizeHeader(k).includes('sayı')) || 'Sayı';
                const keyTarih = keys.find(k => normalizeHeader(k) === 'tarih') || keys.find(k => normalizeHeader(k).includes('tarih')) || 'Tarih';
                const keyKonu = keys.find(k => normalizeHeader(k) === 'konu') || keys.find(k => normalizeHeader(k).includes('konu')) || 'Konu';
                const keyKullanici = keys.find(k => normalizeHeader(k).includes('işlemde bekleyen') && (normalizeHeader(k).includes('kullanıcı') || normalizeHeader(k).includes('kullanici'))) || 'İşlemde Bekleyen Kullanıcı';
                const keyYer = keys.find(k => normalizeHeader(k).includes('geldiği yer') || normalizeHeader(k).includes('gönderildiği yer')) || 'Geldiği Yer / Gönderildiği Yer';

                let filtered = ebysData;
                if (selectedPersonnel.length > 0) filtered = filtered.filter(row => selectedPersonnel.includes(row[keyKullanici]));

                const formatDisplayDate = (val) => { const d = parseEbysDate(val); if (d) return `${String(d.getDate()).padStart(2, '0')}.${String(d.getMonth() + 1).padStart(2, '0')}.${d.getFullYear()}`; return val || ''; };

                return filtered.map(row => ({ sayi: row[keySayi], tarih: formatDisplayDate(row[keyTarih]), tarihRaw: parseEbysDate(row[keyTarih]), konu: row[keyKonu], kullanici: row[keyKullanici], yer: row[keyYer] })).sort((a, b) => { if (a.tarihRaw && b.tarihRaw) return a.tarihRaw - b.tarihRaw; if (a.tarihRaw) return -1; if (b.tarihRaw) return 1; return 0; });
            }, [ebysData, selectedPersonnel]);

            const handleExportEbysTable = () => {
                const dataToExport = displayRows.map(row => ({ 'Sayı': row.sayi, 'Tarih': row.tarih, 'Konu': row.konu, 'İşlemde Bekleyen Kullanıcı': row.kullanici, 'Geldiği Yer / Gönderildiği Yer': row.yer }));
                const ws = XLSX.utils.json_to_sheet(dataToExport); ws['!cols'] = [{ wch: 15 }, { wch: 15 }, { wch: 50 }, { wch: 25 }, { wch: 40 }];
                const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'EBYS_Evraklar'); XLSX.writeFile(wb, 'EBYS_Evrak_Listesi.xlsx');
            };

            return (
                <div className="ebys-reporter-container" style={{backgroundColor: '#f0f9ff', borderColor: '#bae6fd'}}>
                    <div className="ebys-reporter-header"><h3 style={{color: '#075985'}}>EBYS Raporlama</h3></div>
                    <div className="ebys-controls">
                        <div className="control-group">
                            <label>EBYS Excel Raporu Yükle</label><input type="file" multiple onChange={handleFileChange} accept=".xlsx, .xls" />
                             {fileNames.length > 0 && <span style={{marginTop: '5px', fontSize: '0.8rem'}}>Seçilenler: {fileNames.join(', ')}</span>}
                             {totalEbysDocs > 0 && <span style={{fontSize: '0.9rem', color: '#78716c', marginTop: '5px'}}>Toplam Bekleyen Evrak: {totalEbysDocs}</span>}
                        </div>
                        {personnelOptions.length > 0 &&
                             <div className="control-group"><label>Personel Seç</label><button onClick={() => document.getElementById('ebys-personnel-modal').style.display = 'flex'}>{selectedPersonnel.length ? `${selectedPersonnel.length} personel seçili` : 'Personel Seç'}</button></div>
                        }
                        <button onClick={() => generateReport('personnel')} disabled={isLoading || selectedPersonnel.length === 0}>Personel Raporu İndir</button>
                        <button onClick={() => generateReport('year')} disabled={isLoading || ebysData.length === 0} style={{backgroundColor: '#8b5cf6'}}>Yıla Göre Rapor İndir</button>
                        <button onClick={clearEbysData} style={{backgroundColor: '#ef4444', color: 'white'}}>Verileri Temizle</button>
                    </div>

                    {stackedChartData && 
                        <div className="chart-card" style={{marginTop: '20px', minHeight: '400px'}}>
                            <button className="zoom-btn" title="Büyüt" onClick={() => onZoom({ type: 'chart', data: stackedChartData, title: `EBYS Bekleyen Evrak Dağılımı (Toplam: ${totalEbysDocs})` })}>🔍</button>
                            <div className="ebys-chart-container"><canvas ref={ebysChartRef}></canvas></div>
                        </div>
                    }

                    {ebysData.length > 0 && (
                        <div className="warning-table-container" style={{ marginTop: '20px', borderColor: '#fdba74', backgroundColor: '#fff7ed' }}>
                            <div className="warning-table-header"><h3 style={{ color: '#c2410c' }}>EBYS Evrak Listesi (Toplam: {displayRows.length})</h3><div className="button-group"><button onClick={handleExportEbysTable} className="export-btn" style={{backgroundColor: '#ea580c'}}>Excel İndir</button></div></div>
                            <div className="table-wrapper" style={{ maxHeight: '400px' }}>
                                <table>
                                    <thead><tr><th style={{ whiteSpace: 'normal', wordBreak: 'break-word', minWidth: '100px' }}>Sayı</th><th style={{ minWidth: '100px' }}>Tarih</th><th style={{ whiteSpace: 'normal', wordBreak: 'break-word', minWidth: '250px' }}>Konu</th><th style={{ minWidth: '150px' }}>İşlemde Bekleyen Kullanıcı</th><th style={{ whiteSpace: 'normal', wordBreak: 'break-word', minWidth: '200px' }}>Geldiği Yer / Gönderildiği Yer</th></tr></thead>
                                    <tbody>
                                        {displayRows.map((row, idx) => (
                                            <tr key={idx}><td style={{ whiteSpace: 'normal', wordBreak: 'break-word' }}>{row.sayi}</td><td>{row.tarih}</td><td style={{ whiteSpace: 'normal', wordBreak: 'break-word' }}>{row.konu}</td><td>{row.kullanici}</td><td style={{ whiteSpace: 'normal', wordBreak: 'break-word' }}>{row.yer}</td></tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                     <div id="ebys-personnel-modal" className="modal-overlay" style={{display: 'none'}} onClick={() => document.getElementById('ebys-personnel-modal').style.display = 'none'}>
                         <div className="modal" onClick={e => e.stopPropagation()}>
                             <div className="modal-header"><h3>Personel Seç</h3><button className="close-btn" onClick={()=> document.getElementById('ebys-personnel-modal').style.display = 'none'}>×</button></div>
                             <div className="modal-content">
                                 <div className="filter-list">
                                     <div className="filter-item" key="select-all"><label><input type="checkbox" checked={selectedPersonnel.length === personnelOptions.length && personnelOptions.length > 0} onChange={e => { if (e.target.checked) { setSelectedPersonnel(personnelOptions); } else { setSelectedPersonnel([]); } }} /><b>Tümünü Seç/Bırak</b></label></div>
                                     {personnelOptions.map(p => <div className="filter-item" key={p}><label><input type="checkbox" checked={selectedPersonnel.includes(p)} onChange={e=>{ if(e.target.checked) setSelectedPersonnel([...selectedPersonnel,p]); else setSelectedPersonnel(selectedPersonnel.filter(sp=>sp!==p)); }}/> {p}</label></div>)}
                                 </div>
                             </div>
                             <div className="modal-footer"><button className="download-btn" onClick={()=>{setSelectedPersonnel([]); document.getElementById('ebys-personnel-modal').style.display = 'none';}}>Temizle</button><button className="download-btn" style={{backgroundColor: '#16a34a'}} onClick={()=> document.getElementById('ebys-personnel-modal').style.display = 'none'}>Kapat</button></div>
                         </div>
                     </div>
                </div>
            );
        }

        function App() {
            const [data,setData]=useState([]);
            const [engineers, setEngineers] = useState([]);
            const [loading,setLoading]=useState(false);
            const [errorMsg,setErrorMsg]=useState("");
            const [sortField,setSortField]=useState('');
            
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [showDateModal, setShowDateModal] = useState(false);

            const [selectedPersonel,setSelectedPersonel]=useState([]);
            const [selectedIl,setSelectedIl]=useState([]);
            const [selectedIlce, setSelectedIlce] = useState([]); 
            const [selectedIslem, setSelectedIslem] = useState([]); 
            const [personnelFilterType, setPersonnelFilterType] = useState('all'); 
            const [showPersonelModal,setShowPersonelModal]=useState(false);
            const [showIlModal,setShowIlModal]=useState(false);
            const [showIlceModal, setShowIlceModal] = useState(false); 
            const [showIslemModal, setShowIslemModal] = useState(false); 
            const [zoomContent, setZoomContent] = useState(null);
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [isLoggedIn, setIsLoggedIn] = useState(false);

            const [warningThreshold, setWarningThreshold] = useState(0);
            const [megsisData, setMegsisData] = useState([]);

            const modalContentRef = useRef(null);
            const personnelChartCardRef = useRef(null);
            const waitingChartCardRef = useRef(null);
            const islemChartCardRef = useRef(null);
            const districtChartCardRef = useRef(null);
            
            const readExcelFromUrl = async (url) => {
                try {
                    const response = await fetch(url);
                    if (!response.ok) return [];
                    const arrayBuffer = await response.arrayBuffer();
                    const data = new Uint8Array(arrayBuffer);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const ws = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(ws, { header: 1 });
                    return json.flat().filter(name => name != null && name.toString().trim() !== '');
                } catch (error) { return []; }
            };
            
            useEffect(() => {
                const fetchEngineers = async () => {
                    const engineerListUrl = 'https://raw.githubusercontent.com/gokhangeo/istakip/main/M%C3%BChendis.xlsx';
                    const engineerNames = await readExcelFromUrl(engineerListUrl);
                    setEngineers(engineerNames.map(String)); 
                };
                fetchEngineers();
            }, []);

            useEffect(() => {
                const handleFullscreenChange = () => setIsFullscreen(!!document.fullscreenElement);
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
            }, []);

            const toggleFullscreen = () => {
                const elem = modalContentRef.current;
                if (!document.fullscreenElement) {
                    if (elem.requestFullscreen) elem.requestFullscreen();
                    else if (elem.mozRequestFullScreen) elem.mozRequestFullScreen();
                    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                    else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            };

            const isEngineer = (name) => {
                if (!name) return false;
                const normalizedName = normalizeName(name);
                return engineers.some(eng => normalizeName(eng) === normalizedName);
            };

            const handleFile = async (e) => {
                const inputElement = e.target;
                const files = Array.from(inputElement.files || []);
                if (!files.length) return;
                setLoading(true); setErrorMsg("");
                
                try {
                    const engineerFiles = files.filter(f => f.name.toLowerCase().includes('mühendis') || f.name.toLowerCase().includes('muhendis'));
                    const dataFiles = files.filter(f => !f.name.toLowerCase().includes('mühendis') && !f.name.toLowerCase().includes('muhendis'));

                    if (engineerFiles.length > 0) {

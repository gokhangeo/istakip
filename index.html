                        const readSimpleList = (file) => new Promise((resolve, reject) => {
                             const reader = new FileReader();
                             reader.onload = (ev) => {
                                 try {
                                     const data = new Uint8Array(ev.target.result);
                                     const workbook = XLSX.read(data, { type: 'array' });
                                     const ws = workbook.Sheets[workbook.SheetNames[0]];
                                     const json = XLSX.utils.sheet_to_json(ws, { header: 1 });
                                     const names = json.flat().filter(n => n != null && String(n).trim() !== '').map(String);
                                     resolve(names);
                                 } catch (err) { reject(err); }
                             };
                             reader.onerror = reject; reader.readAsArrayBuffer(file);
                        });

                        const engResults = await Promise.all(engineerFiles.map(readSimpleList));
                        const newEngineers = [...new Set(engResults.flat())];
                        setEngineers(prev => [...new Set([...prev, ...newEngineers])]);
                    }

                    if (dataFiles.length > 0) {
                        const newRowsPromises = dataFiles.map(f => readExcelPromise(f).catch(err => {
                            console.error('Excel okuma hatası:', err); 
                            setErrorMsg(err.message || "Dosya okunamadı. Lütfen geçerli bir Excel dosyası yükleyin.");
                            return {rows: []};
                        }));
                        const results = await Promise.all(newRowsPromises);
                        const allNewRows = results.flatMap(res => res.rows);
                        setData(prevData => [...prevData, ...allNewRows]); 
                    }
                } catch (err) { setErrorMsg("Beklenmeyen bir hata oluştu."); } 
                finally { if (inputElement) inputElement.value = null; setLoading(false); }
            };
            
            const handleDownloadModalAsJpeg = () => {
                const elementToCapture = modalContentRef.current;
                if (elementToCapture) {
                    setLoading(true);
                    html2canvas(elementToCapture, {scale: 2, backgroundColor: '#ffffff'}).then(canvas => {
                        const url = canvas.toDataURL('image/jpeg', 1.0);
                        const a = document.createElement('a'); a.href = url;
                        a.download = `${(zoomContent.title || 'rapor').replace(/[^a-z0-9]/gi, '_')}.jpg`; a.click();
                    }).finally(() => setLoading(false));
                }
            };
            
            const handleExportWaitingListExcel = () => {
                if (zoomContent && zoomContent.type === 'waitingList') {
                    const dataToExport = zoomContent.data.map(i => ({'Personel': i.name, 'Bekleyen İşlem Sayısı': i.count}));
                    const ws = XLSX.utils.json_to_sheet(dataToExport); ws['!cols'] = [{ wch: 30 }, { wch: 20 }];
                    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Bekleyen_Islemler'); XLSX.writeFile(wb, 'bekleyen_islem_sayilari.xlsx');
                }
            };

            const ilOptions = Array.from(new Set(data.map(d=>d._province).filter(p=>p))).sort((a,b)=>a.localeCompare(b,'tr'));
            const ilceOptions = Array.from(new Set(data.filter(d => selectedIl.length === 0 || selectedIl.includes(d._province)).map(d => d._district).filter(p => p))).sort((a,b)=>a.localeCompare(b,'tr'));
            const personnelOptions = Array.from(new Set(data.flatMap(d=>splitPersonel(d['görevli personel'])))).sort((a,b)=>a.localeCompare(b,'tr'));
            const islemOptions = Array.from(new Set(data.map(d => d['işlem']).filter(i => i && typeof i === 'string' && i.trim() !== ''))).sort((a,b)=>a.localeCompare(b,'tr'));
            
            const sortOptions=[
                {label:'Sıralama Yok',value:''}, {label:'Başvuru Tarihine Göre',value:'başvuru tarihi'}, {label:'Fen Kayıt Tarihine Göre',value:'fen kayıt tarihi'},
                {label:'İade Edilen',value:'iade edilen'}, {label:'Tescil Edilen', value:'tescile_giden'}, {label:'Tescilden Geldi', value:'tescilden_geldi'},
                {label:'İptal Edilen', value:'iptal_edilen'}, {label:'Fen Kayıt Alınmayan', value:'fen_kayit_alinmayan'}, {label:'Harcı Yatırılmayan', value:'harci_yatirilmayan'},
                {label:'Plan Örneği', value:'plan_ornegi'}, {label:'Bekleyen (Eskiden Yeniye)', value:'bekleyen_eski_yeni'}, {label:'Bekleyen (Yeniden Eskiye)', value:'bekleyen_yeni_eski'},
                {label:'Uygun Olmayan İade Gerekçeleri', value:'uygun_olmayan_iade'}, {label:'Önemli İşler', value:'onemli_isler'}, {label:'Görevlendirme Yapılmayan', value:'gorevlendirme_yapilmayan'}
            ];
            
            const filteredData = React.useMemo(() => {
                let arr=[...data];
                if (startDate) { const sObj = new Date(startDate); arr = arr.filter(d => { const dateVal = d['fen kayıt tarihi'] || d['başvuru tarihi']; if (!dateVal) return false; return new Date(dateVal) >= sObj; }); }
                if (endDate) { const eObj = new Date(endDate); eObj.setHours(23, 59, 59, 999); arr = arr.filter(d => { const dateVal = d['fen kayıt tarihi'] || d['başvuru tarihi']; if (!dateVal) return false; return new Date(dateVal) <= eObj; }); }
                if(selectedIl.length>0) arr=arr.filter(d=>selectedIl.includes(d._province));
                if(selectedIlce.length > 0) arr = arr.filter(d => selectedIlce.includes(d._district));
                if(selectedPersonel.length>0) arr=arr.filter(d=>{const ppl=splitPersonel(d['görevli personel']); return selectedPersonel.some(sp=>ppl.includes(sp));});
                if(selectedIslem.length > 0) arr = arr.filter(d => selectedIslem.includes(d['işlem'])); 
                
                if(sortField==='iade edilen') { arr=arr.filter(d=>String(d['başvuru durumu']||'').toLocaleLowerCase('tr').includes('eksiklikten iade edildi')); }
                else if (sortField === 'tescile_giden') { arr = arr.filter(d => { const status = String(d['başvuru durumu'] || '').toLocaleLowerCase('tr'); const aciklama = String(d['başvuru açıklama'] || '').toLocaleLowerCase('tr'); return status.includes('tescile gönderildi') && aciklama.includes('tescil edildi'); }); }
                else if (sortField === 'tescilden_geldi') { arr = arr.filter(d => String(d['başvuru durumu'] || '').toLocaleLowerCase('tr') === 'tescilden geldi'); }
                else if (sortField === 'iptal_edilen') { arr = arr.filter(d => { const status = String(d['başvuru durumu'] || '').toLocaleLowerCase('tr'); const aciklama = String(d['başvuru açıklama'] || '').toLocaleLowerCase('tr'); return status.includes('tescile gönderildi') && aciklama.includes('iptal'); }); }
                else if (sortField === 'fen_kayit_alinmayan') { arr = arr.filter(d => { const odeme = String(d['ödeme'] || '').toLocaleLowerCase('tr'); return odeme.includes('ödendi') && !odeme.includes('ödenmedi') && (d['fen kayıt no'] === 0 || d['fen kayıt no'] == null); }); }
                else if (sortField === 'plan_ornegi') { arr = arr.filter(d => { const islem = String(d['işlem'] || '').toLocaleLowerCase('tr'); return ['plan örneği', 'mahkeme plan örneği', 'teknik bilgi ve belge örnekleri'].includes(islem); }); }
                else if (sortField === 'bekleyen_eski_yeni') { arr = arr.filter(d => { const status = String(d['başvuru durumu'] || '').toLocaleLowerCase('tr'); return !status.includes('eksiklikten iade edildi') && !status.includes('tescile gönderildi'); }); arr.sort((a, b) => { const dx = new Date(a['başvuru tarihi']); const dy = new Date(b['başvuru tarihi']); if (!isNaN(dx) && !isNaN(dy)) return dx - dy; return 0; }); }
                else if (sortField === 'bekleyen_yeni_eski') { arr = arr.filter(d => { const status = String(d['başvuru durumu'] || '').toLocaleLowerCase('tr'); return !status.includes('eksiklikten iade edildi') && !status.includes('tescile gönderildi'); }); arr.sort((a, b) => { const dx = new Date(a['başvuru tarihi']); const dy = new Date(b['başvuru tarihi']); if (!isNaN(dx) && !isNaN(dy)) return dy - dx; return 0; }); }
                else if (sortField === 'uygun_olmayan_iade') { arr = arr.filter(d => String(d['başvuru durumu'] || '').toLocaleLowerCase('tr').includes('eksiklikten iade edildi')); arr.sort((a,b) => { const pa = a['görevli personel'] || ''; const pb = b['görevli personel'] || ''; return pa.localeCompare(pb, 'tr'); }); }
                else if (sortField === 'onemli_isler') { const onemliIslemler = [ "3194 Sayılı Kanunun 18. Madde Uygulaması", "Kat İrtifakı Tesisi", "Kat Mülkiyeti Tesisi", "Mülkiyet Raporu" ]; arr = arr.filter(d => onemliIslemler.includes(String(d['işlem'] || '').trim())); }
                else if (sortField === 'gorevlendirme_yapilmayan') { const today = new Date(); arr = arr.filter(d => { const personnel = splitPersonel(d['görevli personel']); const status = String(d['başvuru durumu'] || '').toLocaleLowerCase('tr'); const isClosed = status.includes('eksiklikten iade edildi') || status.includes('tescile gönderildi'); if (personnel.length === 0 && !isClosed) { const bStr = d['başvuru tarihi']; if (bStr) { const basvuruDate = new Date(bStr); if (!isNaN(basvuruDate) && basvuruDate.getFullYear() > 1900) { const diffDays = (today - basvuruDate) / (1000 * 60 * 60 * 24); if (diffDays >= 1) return true; } } } return false; }); }
                else if (sortField) { arr.sort((a, b) => { if (sortField.includes('tarih')) { const dateA = a[sortField] ? new Date(a[sortField]) : null; const dateB = b[sortField] ? new Date(b[sortField]) : null; if (!dateA || isNaN(dateA)) return 1; if (!dateB || isNaN(dateB)) return -1; return dateA - dateB; } const valA = a[sortField] || ''; const valB = b[sortField] || ''; if (typeof valA === 'string' && typeof valB === 'string') { return valA.localeCompare(valB, 'tr'); } return valA < valB ? -1 : valA > valB ? 1 : 0; }); }
                return arr;
            }, [data, startDate, endDate, selectedIl, selectedIlce, selectedPersonel, selectedIslem, sortField]);
            
            const LandingPage = ({onFileChange}) => (
                <div className="landing-container">
                    <label htmlFor="file-upload-landing" className="upload-box"><div className="upload-icon">📤</div><div className="upload-text">Analiz için Excel Dosyası Seçin</div><div className="upload-subtext">veya dosyayı buraya sürükleyip bırakın</div></label>
                    <input id="file-upload-landing" type="file" multiple onChange={onFileChange} accept=".xlsx, .xls" style={{display: 'none'}} />
                </div>
            );
            
            if (!isLoggedIn) { return <LoginScreen onLogin={() => setIsLoggedIn(true)} />; }

            return (<div className="container">
                <div className="header-center"><h1>MEGSİS İŞ TAKİP</h1><h2 style={{fontStyle: 'italic', fontSize: '0.9rem', color: '#64748b'}}>© Gökhan ELGÜL tarafından tasarlanmıştır.</h2></div>
                
                {loading && <div style={{position:'fixed', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', zIndex: 3000, background: 'rgba(0,0,0,0.7)', color: 'white', padding: '20px', borderRadius: '10px'}}>Yükleniyor...</div>}
                
                {data.length === 0 && !loading && (
                    <div style={{ width: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                        {errorMsg && <p className="error-message" style={{marginBottom: '20px', padding: '10px', background: '#fee2e2', borderRadius: '8px', border: '1px solid #ef4444', textAlign: 'center'}}>{errorMsg}</p>}
                        <LandingPage onFileChange={handleFile} />
                    </div>
                )}
                
                {data.length > 0 && <React.Fragment>
                    <div className="controls">
                         <div className="control-group"><label>Dosya İşlemleri</label><input type="file" multiple onChange={handleFile} accept=".xlsx, .xls" /></div>
                        <div className="control-group"><label>Sıralama</label><select value={sortField} onChange={e=>setSortField(e.target.value)}>{sortOptions.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select></div>
                        <div className="control-group"><label>Tarih Filtresi</label><button onClick={() => setShowDateModal(true)}>{startDate || endDate ? `${formatToTR(startDate) || '...'} - ${formatToTR(endDate) || '...'}` : 'Tarih Aralığı Seç'}</button></div>
                        <div className="control-group"><label>İl Filtresi</label><button onClick={()=>setShowIlModal(true)}>{selectedIl.length ? `${selectedIl.length} il seçili` : 'İl Seç'}</button></div>
                        <div className="control-group"><label>İlçe Filtresi</label><button onClick={()=>setShowIlceModal(true)} disabled={ilceOptions.length === 0}>{selectedIlce.length ? `${selectedIlce.length} ilçe seçili` : 'İlçe Seç'}</button></div>
                        <div className="control-group"><label>Personel Filtresi</label><button onClick={()=>setShowPersonelModal(true)}>{selectedPersonel.length ? `${selectedPersonel.length} personel seçili` : 'Personel Seç'}</button></div>
                        <div className="control-group"><label>İşlem Filtresi</label><button onClick={()=>setShowIslemModal(true)}>{selectedIslem.length ? `${selectedIslem.length} işlem seçili` : 'İşlem Seç'}</button></div>
                         <div className="control-group"><label>Veri Yönetimi</label><button onClick={() => { setData([]); setSelectedIl([]); setSelectedPersonel([]); setSelectedIlce([]); setSelectedIslem([]); setStartDate(''); setEndDate(''); setErrorMsg(""); }} style={{backgroundColor: '#ef4444', color: 'white'}}>Verileri Temizle</button></div>
                    </div>
                    {errorMsg && <p className="error-message" style={{padding: '10px', background: '#fee2e2', borderRadius: '8px', border: '1px solid #ef4444', textAlign: 'center'}}>{errorMsg}</p>}
                    
                    <Dashboard data={data} filtered={filteredData} sortField={sortField} selectedPersonel={selectedPersonel} selectedIl={selectedIl} selectedIlce={selectedIlce} />
                    
                    <div className="charts-below">
                        <ChartsBelow data={filteredData} onZoom={setZoomContent} personnelChartCardRef={personnelChartCardRef} waitingChartCardRef={waitingChartCardRef} islemChartCardRef={islemChartCardRef} districtChartCardRef={districtChartCardRef} selectedIl={selectedIl} isEngineer={isEngineer} personnelFilterType={personnelFilterType} onFilterChange={setPersonnelFilterType} sortField={sortField} />
                    </div>

                    <WarningTable data={filteredData} isEngineer={isEngineer} personnelFilterType={personnelFilterType} onFilterChange={setPersonnelFilterType} sortField={sortField} onWarningRowsChange={setMegsisData} warningThreshold={warningThreshold} setWarningThreshold={setWarningThreshold} />
                    <DataTable data={filteredData} sortField={sortField} isEngineer={isEngineer} personnelFilterType={personnelFilterType} onFilterChange={setPersonnelFilterType} />
                    
                    <ReportComparison engineers={engineers} isEngineer={isEngineer} />
                    <MegsisReporter data={megsisData} isEngineer={isEngineer} />
                    <EbysReporter onZoom={setZoomContent} />
                </React.Fragment>}
                
                {zoomContent && (
                    <div className="modal-overlay" onClick={() => setZoomContent(null)}>
                        <div className="modal" onClick={e => e.stopPropagation()}>
                           <div className="modal-header"><h3>{zoomContent.title || 'Büyük Görünüm'}</h3><button className="close-btn" onClick={() => setZoomContent(null)}>×</button></div>
                           <div className="modal-content" ref={modalContentRef}>
                                {zoomContent.type === 'chart' && <ZoomedChart chartData={zoomContent.data} title={zoomContent.title} isEngineer={isEngineer} />}
                                {zoomContent.type === 'waitingList' && <ZoomedWaitingList data={zoomContent.data} title={zoomContent.title} />}
                           </div>
                           <div className="modal-footer">
                                <button className="download-btn" onClick={toggleFullscreen}>{isFullscreen ? 'Tam Ekrandan Çık' : 'Tam Ekran'}</button>
                                {zoomContent.type === 'waitingList' ? <button className="download-btn excel-download-btn" onClick={handleExportWaitingListExcel}>Excel İndir</button> : <button className="download-btn" onClick={handleDownloadModalAsJpeg}>JPEG İndir</button>}
                           </div>
                        </div>
                    </div>
                )}

                {/* Modallar */}
                {showDateModal && (
                    <div className="modal-overlay" onClick={() => setShowDateModal(false)}>
                        <div className="modal" onClick={e => e.stopPropagation()}>
                            <div className="modal-header"><h3>Tarih Aralığı Seç</h3><button className="close-btn" onClick={()=>setShowDateModal(false)}>×</button></div>
                            <div className="modal-content">
                                <div style={{display: 'flex', flexDirection: 'column', gap: '15px'}}>
                                    <div><label style={{display:'block', marginBottom:'5px', fontWeight:'bold'}}>Başlangıç Tarihi</label><input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} style={{width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid #ccc'}} /></div>
                                    <div><label style={{display:'block', marginBottom:'5px', fontWeight:'bold'}}>Bitiş Tarihi</label><input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} style={{width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid #ccc'}} /></div>
                                </div>
                            </div>
                            <div className="modal-footer"><button className="download-btn" onClick={()=>{setStartDate(''); setEndDate(''); setShowDateModal(false);}}>Temizle & Kapat</button><button className="download-btn" style={{backgroundColor: '#16a34a'}} onClick={()=> setShowDateModal(false)}>Uygula</button></div>
                        </div>
                    </div>
                )}
                {showIlModal && (
                    <div className="modal-overlay" onClick={() => setShowIlModal(false)}>
                        <div className="modal" onClick={e => e.stopPropagation()}>
                            <div className="modal-header"><h3>İl Seç</h3><button className="close-btn" onClick={()=>setShowIlModal(false)}>×</button></div>
                            <div className="modal-content"><div className="filter-list">{ilOptions.map(il => <div className="filter-item" key={il}><label><input type="checkbox" checked={selectedIl.includes(il)} onChange={e=>{ if(e.target.checked) setSelectedIl([...selectedIl,il]); else setSelectedIl(selectedIl.filter(p=>p!==il)); }}/> {il}</label></div>)}</div></div>
                            <div className="modal-footer"><button className="download-btn" onClick={()=>{setSelectedIl([]); setShowIlModal(false);}}>Temizle & Kapat</button></div>
                        </div>
                    </div>
                )}
                {showIlceModal && (
                    <div className="modal-overlay" onClick={() => setShowIlceModal(false)}>
                        <div className="modal" onClick={e => e.stopPropagation()}>
                            <div className="modal-header"><h3>İlçe Seç</h3><button className="close-btn" onClick={()=>setShowIlceModal(false)}>×</button></div>
                            <div className="modal-content"><div className="filter-list">{ilceOptions.map(ilce => <div className="filter-item" key={ilce}><label><input type="checkbox" checked={selectedIlce.includes(ilce)} onChange={e=>{ if(e.target.checked) setSelectedIlce([...selectedIlce, ilce]); else setSelectedIlce(selectedIlce.filter(i => i !== ilce)); }}/> {ilce}</label></div>)}</div></div>
                            <div className="modal-footer"><button className="download-btn" onClick={()=>{setSelectedIlce([]); setShowIlceModal(false);}}>Temizle & Kapat</button></div>
                        </div>
                    </div>
                )}
                {showPersonelModal && (
                    <div className="modal-overlay" onClick={() => setShowPersonelModal(false)}>
                        <div className="modal" onClick={e => e.stopPropagation()}>
                             <div className="modal-header"><h3>Personel Seç</h3><button className="close-btn" onClick={()=>setShowPersonelModal(false)}>×</button></div>
                             <div className="modal-content"><div className="filter-list">{personnelOptions.map(p => <div className="filter-item" key={p}><label style={{color: isEngineer(p) ? 'red' : 'inherit'}}><input type="checkbox" checked={selectedPersonel.includes(p)} onChange={e=>{ if(e.target.checked) setSelectedPersonel([...selectedPersonel,p]); else setSelectedPersonel(selectedPersonel.filter(sp=>sp!==p)); }}/> {p} {isEngineer(p) ? '(Müh.)' : ''}</label></div>)}</div></div>
                            <div className="modal-footer"><button className="download-btn" onClick={()=>{setSelectedPersonel([]); setShowPersonelModal(false);}}>Temizle & Kapat</button></div>
                        </div>
                    </div>
                )}
                {showIslemModal && (
                    <div className="modal-overlay" onClick={() => setShowIslemModal(false)}>
                        <div className="modal" onClick={e => e.stopPropagation()}>
                            <div className="modal-header"><h3>İşlem Seç</h3><button className="close-btn" onClick={()=>setShowIslemModal(false)}>×</button></div>
                            <div className="modal-content"><div className="filter-list">{islemOptions.map(islem => <div className="filter-item" key={islem}><label><input type="checkbox" checked={selectedIslem.includes(islem)} onChange={e=>{ if(e.target.checked) setSelectedIslem([...selectedIslem, islem]); else setSelectedIslem(selectedIslem.filter(i => i !== islem)); }}/> {islem}</label></div>)}</div></div>
                            <div className="modal-footer"><button className="download-btn" onClick={()=>{setSelectedIslem([]); setShowIslemModal(false);}}>Temizle & Kapat</button></div>
                        </div>
                    </div>
                )}
            </div>);
        }

        const LoginScreen = ({ onLogin }) => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const users = { "mersinkm": "503344", "HATAYBM": "334450", "ELAZIĞKM": "232323", "ELAZIĞBM": "232323" };

            const handleLogin = () => {
                let userToCheck = username;
                if (username.toLowerCase() !== 'mersinkm') userToCheck = username.toUpperCase();
                if (users[userToCheck] && users[userToCheck] === password) onLogin();
                else setError('Kullanıcı adı veya şifre hatalı.');
            };

            return (
                <div className="login-container">
                    <h2>MEGSİS İŞ TAKİP</h2><p>Devam etmek için lütfen giriş yapın.</p>
                    <input type="text" placeholder="Kullanıcı Adı" value={username} onChange={e => setUsername(e.target.value)} />
                    <input type="password" placeholder="Şifre" value={password} onChange={e => setPassword(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleLogin()} />
                    {error && <p className="error">{error}</p>}
                    <button onClick={handleLogin}>Giriş Yap</button>
                    <div className="footer">© Gökhan ELGÜL tarafından tasarlanmıştır.</div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
